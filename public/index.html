<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>销售工单管理系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#2563EB;--ph:#1D4ED8;--p50:#EFF6FF;--sb:#0F172A;--sb-h:#1E293B;--bg:#F8FAFC;--s:#FFFFFF;--t:#1E293B;--ts:#64748B;--b:#E2E8F0;--ok:#059669;--warn:#D97706;--err:#DC2626;--info:#2563EB;--r:10px;--sh:0 1px 2px rgba(0,0,0,.05);--sh-lg:0 10px 40px rgba(0,0,0,.08)}
*,::before,::after{box-sizing:border-box}
body{margin:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
@media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
.hidden{display:none!important}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1E3A5F 0%,#2563EB 50%,#7C3AED 100%);position:relative}
#loginPage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,255,255,.06) 0%,transparent 70%)}
.login-card{background:var(--s);border-radius:16px;padding:44px 40px;width:420px;max-width:calc(100vw - 32px);box-shadow:0 20px 60px rgba(0,0,0,.15);position:relative;z-index:1}
.login-card h1{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;color:var(--t);letter-spacing:-.01em}
.login-card .subtitle{text-align:center;color:var(--ts);margin-bottom:32px;font-size:14px;line-height:1.5}
.fg{margin-bottom:18px}
.fg label{display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:var(--t)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;color:var(--t);background:var(--s);transition:border-color .2s ease,box-shadow .2s ease;outline:none}
.fg input:hover,.fg select:hover{border-color:#94A3B8}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fg input::placeholder{color:#94A3B8}
.fg textarea{resize:vertical;min-height:64px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s ease;outline:none;text-decoration:none;gap:6px;line-height:1.4}
.btn:focus-visible{box-shadow:0 0 0 3px rgba(37,99,235,.3)}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--ph);box-shadow:0 2px 8px rgba(37,99,235,.25)}.btn-p:active{background:#1E40AF}
.btn-s{background:var(--ok);color:#fff}.btn-s:hover{background:#047857}
.btn-w{background:var(--warn);color:#fff}.btn-w:hover{background:#B45309}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{background:#B91C1C}
.btn-o{background:transparent;border:1.5px solid var(--b);color:var(--t)}.btn-o:hover{background:#F1F5F9;border-color:#94A3B8}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:6px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-group{display:flex;gap:10px;flex-wrap:wrap}
#appPage{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sb);color:#E2E8F0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-header h2{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em}
.sidebar-header .role-badge{font-size:11px;color:#64748B;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;padding:10px 20px;color:#94A3B8;text-decoration:none;font-size:13.5px;cursor:pointer;transition:all .15s ease;gap:10px;margin:0 8px;border-radius:8px;position:relative}
.sidebar-nav a:hover{background:var(--sb-h);color:#E2E8F0}
.sidebar-nav a.active{background:rgba(37,99,235,.2);color:#60A5FA;font-weight:500}
.sidebar-nav a .icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.06)}
.sidebar-footer .user-info{font-size:12.5px;color:#64748B;margin-bottom:8px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--s);padding:16px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.topbar h3{font-size:17px;font-weight:600;letter-spacing:-.01em}
.content{flex:1;padding:28px;overflow-y:auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--s);padding:22px 24px;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--b);transition:box-shadow .2s ease}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.stat-card .label{font-size:12.5px;color:var(--ts);margin-bottom:6px;font-weight:500;letter-spacing:.01em}
.stat-card .value{font-size:30px;font-weight:700;letter-spacing:-.02em}
.card{background:var(--s);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--b);padding:24px;margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.card-header h4{font-size:15px;font-weight:600;letter-spacing:-.01em}
.table-wrap{overflow-x:auto;border:1px solid var(--b);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
table th{background:#F8FAFC;padding:10px 14px;text-align:left;font-weight:600;color:var(--ts);border-bottom:2px solid var(--b);white-space:nowrap;font-size:12px;letter-spacing:.02em;text-transform:uppercase}
table td{padding:12px 14px;border-bottom:1px solid var(--b);color:var(--t)}
table tbody tr{transition:background .12s ease}
table tbody tr:hover td{background:#F8FAFC}
table .actions{display:flex;gap:6px;flex-wrap:nowrap}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;gap:4px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-blue{background:#EFF6FF;color:#1D4ED8}.badge-blue::before{background:#3B82F6}
.badge-green{background:#ECFDF5;color:#065F46}.badge-green::before{background:#10B981}
.badge-orange{background:#FFFBEB;color:#92400E}.badge-orange::before{background:#F59E0B}
.badge-red{background:#FEF2F2;color:#991B1B}.badge-red::before{background:#EF4444}
.badge-gray{background:#F8FAFC;color:#475569}.badge-gray::before{background:#94A3B8}
.badge-purple{background:#F5F3FF;color:#5B21B6}.badge-purple::before{background:#8B5CF6}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
.modal{background:var(--s);border-radius:14px;padding:28px;width:580px;max-width:calc(100vw - 32px);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:slideUp .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal h4{font-size:17px;font-weight:600;margin-bottom:22px;letter-spacing:-.01em}
.modal .fa{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px}
.di label{font-size:11.5px;color:var(--ts);display:block;margin-bottom:3px;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.di span{font-size:14px;font-weight:500}
.masked{color:var(--warn)}
.toast{position:fixed;top:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13.5px;z-index:2000;animation:toastIn .25s ease;box-shadow:0 8px 24px rgba(0,0,0,.12);font-weight:500}
.toast-success{background:var(--ok)}.toast-error{background:var(--err)}.toast-info{background:var(--p)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.search-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:180px;padding:9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}.search-bar input:focus{border-color:var(--p);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.search-bar select{padding:9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;background:var(--s);cursor:pointer}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--b)}
.timeline-item{position:relative;margin-bottom:18px;padding-left:12px}
.timeline-item::before{content:'';position:absolute;left:-22px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--p);border:2px solid var(--s)}
.timeline-item .time{font-size:11px;color:var(--ts);margin-bottom:2px}
.timeline-item .content{font-size:13.5px;color:var(--t)}
.phone-link{color:var(--p);text-decoration:none;font-weight:500}.phone-link:hover{text-decoration:underline;color:var(--ph)}
.copy-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border:1.5px solid var(--b);border-radius:6px;font-size:11.5px;cursor:pointer;background:var(--s);color:var(--ts);transition:all .15s ease;white-space:nowrap;margin-left:6px;font-family:inherit}
.copy-btn:hover{background:var(--p);color:#fff;border-color:var(--p)}.copy-btn.copied{background:var(--ok);color:#fff;border-color:var(--ok);pointer-events:none}
.perm-section{margin-bottom:22px}.perm-section h5{font-size:14px;margin-bottom:10px;color:var(--p);font-weight:600}
.perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.perm-item{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#F8FAFC;border-radius:6px;cursor:pointer;font-size:13px;border:1.5px solid transparent;transition:all .12s ease}
.perm-item:hover{background:var(--p50);border-color:rgba(37,99,235,.15)}
.perm-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--p);cursor:pointer}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);z-index:900;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.bottom-nav-inner{display:flex;justify-content:space-around;max-width:500px;margin:0 auto}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;padding:6px 6px 4px;color:var(--ts);text-decoration:none;font-size:10px;cursor:pointer;transition:color .15s;gap:3px;flex:1}.bottom-nav a.active{color:var(--p);font-weight:600}
.bottom-nav a .bn-icon{font-size:18px}

@media(max-width:768px){
#appPage{flex-direction:column}.sidebar{display:none!important}.main{width:100%;padding-bottom:72px}
.topbar{padding:14px 18px}.topbar h3{font-size:16px}.topbar span{display:none}.content{padding:16px}
.fr{grid-template-columns:1fr}.dg{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr;gap:10px}
.stat-card{padding:16px 18px}.stat-card .value{font-size:24px}.card{padding:18px}.card-header h4{font-size:14.5px}
.table-wrap{border-radius:0;border-left:none;border-right:none;margin:0 -16px}table{font-size:12.5px;min-width:600px}table th,table td{padding:9px 12px}
.modal-overlay{align-items:flex-end}.modal{width:100%;max-width:100%;border-radius:18px 18px 0 0;padding:22px 18px;max-height:90vh}.modal h4{font-size:16px}
.fg input,.fg select,.fg textarea{font-size:16px;padding:12px}.btn{padding:11px 18px;font-size:14.5px}.btn-sm{padding:7px 14px;font-size:13px}
.login-card{padding:32px 22px;width:100%;max-width:100%;border-radius:0}#loginPage{align-items:flex-start;padding-top:80px}
.search-bar{flex-direction:column}.search-bar input{width:100%}.perm-grid{grid-template-columns:1fr 1fr}
.bottom-nav{display:block}
}
</style>
</head>
<body>
<div id="loginPage">
<div class="login-card">
<h1>销售工单管理系统</h1>
<p class="subtitle">请登录您的账号</p>
<div class="fg"><label>用户名</label><input type="text" id="loginUsername" autocomplete="off" placeholder="请输入用户名"></div>
<div class="fg"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
<div id="loginError" style="color:var(--err);font-size:13px;margin-bottom:14px;display:none"></div>
<button class="btn btn-p btn-block" onclick="handleLogin()">登 录</button>
</div></div>
<div id="appPage" class="hidden">
<aside class="sidebar">
<div class="sidebar-header"><h2>工单管理系统</h2><div class="role-badge" id="sidebarRole"></div></div>
<nav class="sidebar-nav" id="sidebarNav"></nav>
<div class="sidebar-footer"><div class="user-info" id="sidebarUser"></div><button class="btn btn-o btn-sm btn-block" style="color:#94A3B8;border-color:rgba(255,255,255,.1)" onclick="handleLogout()">退出登录</button></div>
</aside>
<main class="main">
<div class="topbar"><h3 id="pageTitle">控制台</h3><span style="font-size:13px;color:var(--ts)" id="currentTime"></span></div>
<div class="content" id="mainContent"></div>
</main>
<nav class="bottom-nav" id="bottomNav"><div class="bottom-nav-inner" id="bottomNavInner"></div></nav>
</div>
<script>
const M={
dashboard:'⌂',users:'☺','all-orders':'[=]','all-deliveries':'➤',
'create-order':'+','my-orders':'☰','order-pool':'○','dispatch-mgmt':'⇄',
'my-tasks':'✓',reports:'≡'
};
const API=window.location.origin+'/api';
function esc(s){if(s===null||s===undefined)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function $(id){return document.getElementById(id)}
function toast(msg,type='info'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800)}
function maskPhone(p){if(!p||p.length<7)return esc(p);return esc(p.substring(0,3))+'****'+esc(p.substring(p.length-4))}
function clickablePhone(p){if(!p||p.length<7)return esc(p);return'<a href="tel:'+esc(p)+'" class="phone-link">'+esc(p)+'</a>'}
function copyableAddress(a){if(!a)return esc(a);return esc(a)+' <button class="copy-btn" onclick="copyAddr(this,\''+esc(a.replace(/'/g,"\\'"))+'\')">复制</button>'}
function copyAddr(btn,t){navigator.clipboard.writeText(t).then(()=>{btn.textContent='已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},1500)}).catch(()=>toast('复制失败','error'))}
function statusBadge(s,tp='order'){
  const m={order:{draft:'草稿',pending:'待派单',dispatched:'已派单',delivering:'配送中',delivered:'已送达',completed:'已完成',cancelled:'已取消',exception:'异常'},delivery:{assigned:'已分配',accepted:'已接单',in_transit:'配送中',delivered:'已送达',signed:'已签收',failed:'配送失败',cancelled:'已取消',reassigned:'已改派'},user:{active:'在职',inactive:'离职',locked:'已锁定'}};
  const c={order:{draft:'gray',pending:'orange',dispatched:'blue',delivering:'purple',delivered:'green',completed:'green',cancelled:'red',exception:'red'},delivery:{assigned:'blue',accepted:'blue',in_transit:'purple',delivered:'green',signed:'green',failed:'red',cancelled:'gray',reassigned:'orange'},user:{active:'green',inactive:'gray',locked:'red'}};
  return'<span class="badge badge-'+(c[tp]||{})[s]||'gray'+'">'+esc((m[tp]||{})[s]||s)+'</span>'
}
function paymentLabel(pm){const m={cash:'现金',wechat:'微信',alipay:'支付宝',card:'银行卡',transfer:'转账',cod:'货到付款'};return m[pm]||pm||'现金'}
function fmtDate(ts){return ts||'-'}
function renderTimeline(logs){if(!logs||!logs.length)return'<p style="color:var(--ts);font-size:13px;padding:8px 0">暂无记录</p>';return'<div class="timeline">'+logs.map(l=>'<div class="timeline-item"><div class="time">'+esc(l.created_at||l.time)+'</div><div class="content">'+esc(l.to_status||l.action)+' — '+esc(l.operator_name||l.operator||'')+'</div></div>').join('')+'</div>'}

let token=null,currentUser=null,currentPage='dashboard',clockInterval=null,userRoles=[],userPermissions=[],userMenus=[];
async function api(path,options={}){const h=options.headers||{};if(token)h['Authorization']='Bearer '+token;h['Content-Type']=h['Content-Type']||'application/json';const r=await fetch(API+path,{...options,headers:h});if(r.status===401){handleLogout();throw new Error('登录已过期')}if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'请求失败')}return r.json()}

function handleLogin(){
  const u=$('loginUsername').value.trim(),p=$('loginPassword').value.trim(),err=$('loginError');
  if(!u||!p){err.style.display='block';err.textContent='请输入用户名和密码';return}
  err.style.display='none';
  api('/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})}).then(data=>{
    token=data.token;currentUser=data.user;userMenus=data.menus;
    $('loginPage').classList.add('hidden');$('appPage').classList.remove('hidden');
    api('/auth/me').then(d=>{userRoles=d.roles||[];userPermissions=d.permissions||[];userMenus=d.menus||[]}).finally(()=>initApp());
  }).catch(e=>{err.style.display='block';err.textContent=e.message})
}

function handleLogout(){
  if(clockInterval){clearInterval(clockInterval);clockInterval=null}
  token=null;currentUser=null;currentPage='dashboard';userRoles=[];userPermissions=[];userMenus=[];
  $('appPage').classList.add('hidden');$('loginPage').classList.remove('hidden');$('loginUsername').value='';$('loginPassword').value=''
}

function initApp(){
  $('sidebarUser').textContent=currentUser.displayName+' ('+currentUser.username+')';
  $('sidebarRole').textContent=userRoles.length?userRoles.map(r=>r.name||r.code).join('/'):'';
  buildSidebar();navigate('dashboard');
  if(clockInterval)clearInterval(clockInterval);
  clockInterval=setInterval(()=>{$('currentTime').textContent=new Date().toLocaleString('zh-CN')},1000);
  $('currentTime').textContent=new Date().toLocaleString('zh-CN')
}
function buildSidebar(){
  const items=userMenus.map(m=>({page:m.code,label:m.title,icon:M[m.code]||'·'}));
  $('sidebarNav').innerHTML=items.map(i=>'<a class="'+(currentPage===i.page?'active':'')+'" onclick="navigate(\''+i.page+'\')"><span class="icon">'+i.icon+'</span><span>'+esc(i.label)+'</span></a>').join('');
  const bi=$('bottomNavInner');if(bi)bi.innerHTML=items.map(i=>'<a class="'+(currentPage===i.page?'active':'')+'" onclick="navigate(\''+i.page+'\')"><span class="bn-icon">'+i.icon+'</span>'+esc(i.label)+'</a>').join('')
}
function navigate(p){currentPage=p;buildSidebar();const t={dashboard:'控制台',users:'用户管理','all-orders':'全部工单','all-deliveries':'配送记录','create-order':'创建工单','my-orders':'我的工单','order-pool':'工单池','dispatch-mgmt':'派单管理','my-tasks':'我的任务'};$('pageTitle').textContent=t[p]||p;const r={dashboard:renderDashboard,users:renderUsers,'all-orders':renderAllOrders,'all-deliveries':renderAllDeliveries,'create-order':renderCreateOrder,'my-orders':renderMyOrders,'order-pool':renderOrderPool,'dispatch-mgmt':renderDispatchMgmt,'my-tasks':renderMyTasks};if(r[p])r[p]()}

// ==================== DASHBOARD ====================
async function renderDashboard(){
  try{const d=await api('/dashboard/summary'),o=d.orders||{};
    $('mainContent').innerHTML='<div class="stats-grid"><div class="stat-card"><div class="label">待派单</div><div class="value" style="color:var(--warn)">'+(o.pending||0)+'</div></div><div class="stat-card"><div class="label">配送中</div><div class="value" style="color:var(--info)">'+(o.delivering||0)+'</div></div><div class="stat-card"><div class="label">已完成</div><div class="value" style="color:var(--ok)">'+(o.completed||0)+'</div></div><div class="stat-card"><div class="label">总工单</div><div class="value" style="color:var(--t)">'+(o.total||0)+'</div></div></div><div class="card"><div class="card-header"><h4>欢迎使用</h4></div><p style="color:var(--ts);line-height:1.8">当前登录：<strong>'+esc(currentUser.displayName)+'</strong><br>系统根据您的权限控制功能可见性。</p></div>'
  }catch(e){$('mainContent').innerHTML='<p style="color:var(--err)">'+esc(e.message)+'</p>'}}

// ==================== USERS ====================

async function saveUser(uid){

function showSM(did,cur){
  const o=[{v:'in_transit',l:'配送中'},{v:'delivered',l:'已送达'},{v:'signed',l:'已签收'},{v:'failed',l:'配送失败'}].filter(o=>o.v!==cur);
  $('statusModal').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal(\'statusModal\')"><div class="modal"><h4>更新配送状态</h4><div class="fg"><label>新状态</label><select id="nsStatus">'+o.map(o=>'<option value="'+o.v+'">'+o.l+'</option>').join('')+'</select></div><div class="fg"><label>备注</label><textarea id="nsNote" placeholder="可选备注"></textarea></div><div class="fa"><button class="btn btn-o" onclick="closeModal(\'statusModal\')">取消</button><button class="btn btn-p" onclick="confirmS('+did+')">确认</button></div></div></div>'
}
async function confirmS(did){const s=$('nsStatus').value,n=$('nsNote').value.trim();try{await api('/delivery-tasks/'+did+'/status',{method:'POST',body:JSON.stringify({status:s,note:n})});closeModal('statusModal');toast('状态已更新','success');renderMyTasks()}catch(e){toast(e.message,'error')}}

async function renderAllDeliveries(){
  try{const d=await api('/delivery-tasks');
    $('mainContent').innerHTML='<div class="card"><div class="card-header"><h4>全部配送记录</h4></div><div class="table-wrap"><table><thead><tr><th>配送单号</th><th>工单号</th><th>派单人</th><th>送货员</th><th>顾客</th><th>状态</th><th>分派时间</th></tr></thead><tbody>'+d.data.map(t=>'<tr><td>'+esc(t.delivery_no)+'</td><td>'+esc(t.order_no)+'</td><td>'+esc(t.dispatcher_name||'')+'</td><td>'+esc(t.courier_name||'')+'</td><td>'+esc(t.customer_name)+'</td><td>'+statusBadge(t.status,'delivery')+'</td><td>'+fmtDate(t.assigned_at)+'</td></tr>').join('')+'</tbody></table></div></div>'
  }catch(e){$('mainContent').innerHTML='<p style="color:var(--err)">'+esc(e.message)+'</p>'}}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!$('loginPage').classList.contains('hidden'))handleLogin()})
</script>
</body>
</html>
